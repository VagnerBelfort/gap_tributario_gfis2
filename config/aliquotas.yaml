# Configuração de alíquotas ICMS-MA por período
# Gerenciado pela Calculadora de Gap Tributário do ICMS-MA
#
# Formato:
#   aliquotas: Lista de alíquotas vigentes por período (não podem se sobrepor)
#   fontes: Caminhos base para as fontes de dados locais
#   oracle: Configurações de conexão Oracle Siscomex (opcional)

aliquotas:
  - ano_inicio: 2010
    ano_fim: 2022
    aliquota: 0.18
    legislacao: "Lei Estadual vigente até 2022"
  - ano_inicio: 2023
    ano_fim: null  # vigente — sem data de fim definida
    aliquota: 0.20
    legislacao: "Lei 11.867/2022 — alíquota modal 20%"

fontes:
  parquet_base_path: "./bases/g_arrecadacao/ouro/"
  mdic_base_path: "./mdic_comex/dados/"

oracle:
  dsn: "${ORACLE_DSN:-}"          # env var, vazio = desabilitado
  user: "${ORACLE_USER:-}"
  password: "${ORACLE_PASSWORD:-}"
